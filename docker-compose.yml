# Local development dependencies for HealthPlatform (PostgreSQL, MongoDB, Redis, Elasticsearch).
# Start: docker compose up -d
# API connection strings for this stack are in appsettings.Development.json.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: health
      POSTGRES_PASSWORD: health_dev_password
      POSTGRES_DB: healthplatform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health -d healthplatform"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data

volumes:
  pgdata:
  mongodata:
  esdata:
