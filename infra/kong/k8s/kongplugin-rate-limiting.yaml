# For Kong Ingress Controller (install chart separately). Attach via Ingress annotation:
#   konghq.com/plugins: rate-limiting-api
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: rate-limiting-api
  namespace: core-services
plugin: rate-limiting
config:
  minute: 120
  second: 20
  policy: local
  fault_tolerant: true
