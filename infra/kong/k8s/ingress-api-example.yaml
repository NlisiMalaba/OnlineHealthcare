# Example Ingress wiring Kong plugins to core routes. Adjust hosts and backend services.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: health-platform-api
  namespace: core-services
  annotations:
    konghq.com/strip-path: "false"
    konghq.com/plugins: rate-limiting-api,jwt-keycloak
spec:
  ingressClassName: kong
  rules:
    - host: api.health-platform.local
      http:
        paths:
          - path: /graphql
            pathType: Prefix
            backend:
              service:
                name: apollo-gateway
                port:
                  number: 4000
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: user-profile
                port:
                  number: 8080
