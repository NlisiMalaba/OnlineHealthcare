_format_version: "3.0"
_transform: false

# DB-less Kong. Pair with infra/kong/k8s/kongplugin-jwt-keycloak.yaml when using Kong Ingress Controller.
# Keycloak issuer (dev): http://localhost:8080/realms/health-platform

services:
  - name: apollo-graphql
    url: http://apollo-gateway:4000
    routes:
      - name: graphql
        paths:
          - /graphql
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 300
              policy: local
              fault_tolerant: true

  - name: user-profile
    url: http://user-profile:8080
    routes:
      - name: user-profile-api
        paths:
          - /api/v1/users
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 120
              policy: local

  - name: appointment
