# DR templates: ensure outbound traffic to mesh services uses ISTIO_MUTUAL.
# Customize host subsets per service as deployments are added.
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: core-services-mtls
  namespace: core-services
spec:
  host: "*.core-services.svc.cluster.local"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: ai-services-mtls
  namespace: ai-services
spec:
  host: "*.ai-services.svc.cluster.local"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
